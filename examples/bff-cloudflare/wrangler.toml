name = "bff-cloudflare"
main = "src/worker.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
UPSTREAM_BASE_URL = "https://api.example.com"
SESSION_COOKIE_DOMAIN = ".example.com"

[[kv_namespaces]]
binding = "SESSIONS"
id = "PASTE_KV_ID_HERE"

[site]
bucket = "./dist"